# ────────────────────────────────────────────────────────────────────────
# YantraOS — NetworkManager Wi-Fi Backend Configuration
# Target: /etc/NetworkManager/conf.d/wifi-backend.conf
#
# Forces NetworkManager to use iwd as the Wi-Fi backend instead of
# wpa_supplicant. This provides seamless connectivity directly from
# the Live USB with modern WPA3 support and faster roaming.
# ────────────────────────────────────────────────────────────────────────

[device]
wifi.backend=iwd

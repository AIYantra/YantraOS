# ──────────────────────────────────────────────────────────────────────────────
# YantraOS — systemd-tmpfiles volatile/persistent state management
# Target: /etc/tmpfiles.d/yantra.conf
#
# Creates runtime and persistent directories with correct ownership at boot.
# /run/yantra is ephemeral (tmpfs) — recreated every boot by systemd-tmpfiles.
# /var/lib/yantra and /var/log/yantra persist across reboots.
# ──────────────────────────────────────────────────────────────────────────────
d /run/yantra      0750 yantra_daemon yantra -
d /var/lib/yantra  0750 yantra_daemon yantra -
d /var/log/yantra  0750 yantra_daemon yantra -

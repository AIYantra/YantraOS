# ──────────────────────────────────────────────────────────────────────────────
# YantraOS — UFW Firewall Baseline Configuration
# Target: /etc/ufw/ufw.conf
#
# Network Geometry:
#   The Kriya Loop daemon operates entirely on:
#     • Outbound requests — telemetry (yantraos.com), cloud LLMs (Gemini, Claude)
#     • Local IPC — Unix Domain Socket (/run/yantra/ipc.sock)
#
#   There are NO inbound services exposed. The firewall defaults to:
#     INPUT  → DROP (reject all unsolicited inbound traffic)
#     OUTPUT → ACCEPT (allow all outbound requests)
#
# This configuration hardens the live environment against port scanning,
# drive-by exploitation, and lateral movement on untrusted networks.
# ──────────────────────────────────────────────────────────────────────────────

# Enable UFW at boot
ENABLED=yes

# Logging level: low is sufficient for an edge node
LOGLEVEL=low

# ── Default Policies ──────────────────────────────────────────────────────────
# DROP all inbound — no services are exposed
DEFAULT_INPUT_POLICY="DROP"

# ACCEPT all outbound — daemon needs cloud inference + telemetry
DEFAULT_OUTPUT_POLICY="ACCEPT"

# DROP forwarding — no routing between interfaces
DEFAULT_FORWARD_POLICY="DROP"

# ── IPv6 Support ──────────────────────────────────────────────────────────────
IPV6=yes

# ── Manage builtins ──────────────────────────────────────────────────────────
MANAGE_BUILTINS=no

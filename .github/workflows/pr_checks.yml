name: PR Checks

on:
  pull_request:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          pip install --require-hashes -r requirements.lock
          pip install flake8==7.3.0
      - name: Lint with flake8
        run: |
          # stop the build if there are Python syntax errors or undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
      - name: Security regression suite
        run: python -m unittest discover
      - name: Deployment policy
        run: python test_deployment_security.py
      - name: Shell syntax
        run: |
          bash -n archlive/forge_sovereign_iso.sh
          bash -n cloud/forge_azure_vhd.sh
          bash -n cloud/azure_vm_deploy.azcli
      - name: Build sandbox image
        run: docker build --tag yantra-sandbox:test core/sandbox

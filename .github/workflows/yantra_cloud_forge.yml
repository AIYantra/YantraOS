name: YantraOS Cloud Forge

on:
  push:
    branches:
      - main

# Required for Azure OIDC authentication
permissions:
  id-token: write
  contents: read

jobs:
  forge-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout Repository
        uses: actions/checkout@v4

      - name: 1.1 Provision Matrix Toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-utils arch-install-scripts btrfs-progs dosfstools parted rsync pacman-package-manager archlinux-keyring
          sudo mkdir -p /etc/pacman.d
          echo 'Server = https://geo.mirror.pkgbuild.com/$repo/os/$arch' | sudo tee /etc/pacman.d/mirrorlist
          sudo pacman-key --init
          sudo pacman-key --populate archlinux
          printf '[options]\nArchitecture = x86_64\nSigLevel = Never\n\n[core]\nInclude = /etc/pacman.d/mirrorlist\n\n[extra]\nInclude = /etc/pacman.d/mirrorlist\n' | sudo tee /etc/pacman.conf > /dev/null

      - name: 2. Authenticate to Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: 2.5 Inject Telegram Secrets
        run: |
          cat <<EOF > host_secrets.env
          TELEGRAM_BOT_TOKEN="${{ secrets.TELEGRAM_BOT_TOKEN }}"
          TELEGRAM_OPERATOR_CHAT_ID="${{ secrets.TELEGRAM_OPERATOR_CHAT_ID }}"
          AZURE_OPENAI_API_KEY="${{ secrets.AZURE_OPENAI_API_KEY }}"
          AZURE_OPENAI_ENDPOINT="${{ secrets.AZURE_OPENAI_ENDPOINT }}"
          EOF
          sudo groupadd yantra || true
          sudo chown root:yantra host_secrets.env
          sudo chmod 0640 host_secrets.env

      - name: 3. Forge Azure VHD
        run: sudo bash cloud/forge_azure_vhd.sh

      - name: 4. Cascade Deployment (Azure CLI)
        run: bash cloud/azure_vm_deploy.azcli --location westus2 --vm-size Standard_D2s_v3 --resource-group yantra-cloud-rg-westus3 --storage-account yantravhdstgwest3

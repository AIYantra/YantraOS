name: YantraOS Cloud Forge

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: yantra-cloud-production
  cancel-in-progress: false

jobs:
  forge:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: 1. Checkout Repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: 1.1 Provision Matrix Toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-utils arch-install-scripts btrfs-progs dosfstools parted rsync pacman-package-manager archlinux-keyring
          sudo mkdir -p /etc/pacman.d
          echo 'Server = https://geo.mirror.pkgbuild.com/$repo/os/$arch' | sudo tee /etc/pacman.d/mirrorlist
          sudo pacman-key --init
          sudo pacman-key --populate archlinux
          sudo pacman -Sy --noconfirm archlinux-keyring
          printf '[options]\nArchitecture = x86_64\nSigLevel = Required DatabaseOptional\n\n[core]\nInclude = /etc/pacman.d/mirrorlist\n\n[extra]\nInclude = /etc/pacman.d/mirrorlist\n' | sudo tee /etc/pacman.conf > /dev/null

      - name: 1.2 Verify Deployment Security Policy
        run: python3 test_deployment_security.py

      - name: 2. Forge Azure VHD Before Cloud Authentication
        # Application credentials are provisioned after deployment; none enter the image.
        run: sudo bash cloud/forge_azure_vhd.sh

      - name: 3. Publish Candidate VHD
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: yantraos-vhd-${{ github.sha }}
          path: cloud/yantraos-azure.vhd
          compression-level: 0
          retention-days: 1

  deploy:
    needs: forge
    runs-on: ubuntu-latest
    environment: production
    permissions:
      id-token: write
      contents: read
    steps:
      - name: 1. Checkout Deployment Scripts
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: 2. Download Candidate VHD
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: yantraos-vhd-${{ github.sha }}
          path: cloud

      - name: 3. Authenticate to Azure (OIDC)
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2.3.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: 4. Cascade Deployment (Azure CLI)
        run: bash cloud/azure_vm_deploy.azcli --location westus2 --vm-size Standard_D2s_v3 --resource-group yantra-cloud-rg-westus3 --storage-account yantravhdstgwest3 --key-vault-name "${{ vars.YANTRA_KEY_VAULT_NAME }}" --key-vault-secret-name "${{ vars.YANTRA_KEY_VAULT_SECRET_NAME }}"

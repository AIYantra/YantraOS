<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <title>YantraOS — Dashboard</title>
  <meta name="description" content="YantraOS Kriya Loop control panel — real-time telemetry and daemon management." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/web/style.css" />
</head>
<body>

<!--
  ┌──────────────────────────────────────────────────────────┐
  │  #app-shell                                              │
  │  grid: 48px header / 1fr main / 36px footer             │
  │  ┌──────────────────────────────────────────────────┐   │
  │  │  #app-header                                     │   │
  │  ├──────────────┬───────────────────────────────────┤   │
  │  │  #app-sidebar│  #app-content                     │   │
  │  │  (220px)     │  (1fr)                            │   │
  │  ├──────────────┴───────────────────────────────────┤   │
  │  │  #app-footer                                     │   │
  │  └──────────────────────────────────────────────────┘   │
  └──────────────────────────────────────────────────────────┘
-->

<div id="app-shell">
  <header id="app-header" role="banner"></header>

  <div id="app-body">
    <nav id="app-sidebar" role="navigation" aria-label="Sidebar"></nav>
    <main id="app-content" role="main"></main>
  </div>

  <footer id="app-footer" role="contentinfo" aria-label="System telemetry strip"></footer>
</div>

<script type="module" src="/web/app.js"></script>
</body>
</html>

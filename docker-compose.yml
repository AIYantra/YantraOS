services:
  yantra-daemon:
    build:
      context: .
      dockerfile: Dockerfile.daemon
    container_name: yantra-daemon
    restart: unless-stopped
    init: true
    user: "${YANTRA_UID:?YANTRA_UID must match the host yantra_daemon UID}:${YANTRA_GID:?YANTRA_GID must match the host yantra group GID}"
    read_only: true
    env_file:
      - path: /etc/yantra/daemon.env
        required: false
    environment:
      HOME: /tmp
      XDG_CACHE_HOME: /tmp/.cache
      HF_HOME: /var/lib/yantra/cache
      YANTRA_AUDIT_LOG_PATH: /var/log/yantra/audit.jsonl
      YANTRA_CONFIRMATION_COUNTER_PATH: /var/lib/yantra/confirmation_counter.json
    mem_limit: 512m
    pids_limit: 128
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=64m,mode=1777
    volumes:
      # Bind socket files, never their root-owned parent directories.
      - type: bind
        source: /run/yantra-sandbox/broker.sock
        target: /run/yantra-sandbox/broker.sock
        read_only: true
        bind:
          create_host_path: false
      - ./yantra_logs:/var/log/yantra
      - ./yantra_state:/var/lib/yantra
      - ./yantra_data:/shared_data

version: "3.8"

services:
  yantra-daemon:
    build:
      context: .
      dockerfile: Dockerfile.daemon
    container_name: yantra-daemon
    restart: unless-stopped
    env_file:
      - .env
    mem_limit: 512m
    volumes:
      # Sibling-container execution (CRITICAL)
      - /var/run/docker.sock:/var/run/docker.sock
      # UNIX Domain Socket for host executor intents
      - /run/yantra:/run/yantra
      # Host secrets for API tokens
      - /etc/yantra/host_secrets.env:/etc/yantra/host_secrets.env:ro
      # Host auth log for brute-force detection
      - /var/log/auth.log:/host_log/auth.log:ro
      # Persistent audit log mounting
      - ./yantra_logs:/var/log/yantra
      # Shared data corridor for Threat Intelligence Dashboard
      - ./yantra_data:/shared_data
    ports:
      - "50000:50000"

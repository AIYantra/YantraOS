<svg xmlns="http://www.w3.org/2000/svg" width="340" height="28" viewBox="0 0 340 28" role="img" aria-label="Microsoft for Startups: Founders Hub">
  <title>Microsoft for Startups — Founders Hub</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1a1a2e"/>
      <stop offset="1" stop-color="#0f1120"/>
    </linearGradient>
    <linearGradient id="rightBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0063b1"/>
      <stop offset="1" stop-color="#004e8c"/>
    </linearGradient>
  </defs>

  <!-- Outer border / shape -->
  <rect width="340" height="28" fill="url(#bg)"/>

  <!-- Left section: dark label -->
  <rect width="195" height="28" fill="#161b22"/>

  <!-- Right section: Microsoft blue -->
  <rect x="195" width="145" height="28" fill="url(#rightBg)"/>

  <!-- Right section cyan top-line accent -->
  <rect x="195" width="145" height="2" fill="#00E5FF" opacity="0.7"/>

  <!-- Microsoft 4-color logo (2×2 grid of squares at 7px each, 1px gap) -->
  <rect x="10" y="9" width="7" height="7" fill="#F25022"/>
  <rect x="19" y="9" width="7" height="7" fill="#7FBA00"/>
  <rect x="10" y="17" width="7" height="7" fill="#00A4EF"/>
  <rect x="19" y="17" width="7" height="7" fill="#FFB900"/>

  <!-- Left label text: "MICROSOFT FOR STARTUPS" -->
  <text x="33" y="19"
    font-family="Verdana,Geneva,DejaVu Sans,sans-serif"
    font-size="10"
    font-weight="bold"
    letter-spacing="0.8"
    fill="#e0e0e0">MICROSOFT FOR STARTUPS</text>

  <!-- Separator line -->
  <rect x="193" width="2" height="28" fill="#00E5FF" opacity="0.4"/>

  <!-- Right value text: "FOUNDERS HUB" -->
  <text x="252" y="19"
    font-family="Verdana,Geneva,DejaVu Sans,sans-serif"
    font-size="10"
    font-weight="bold"
    letter-spacing="0.8"
    fill="#ffffff"
    text-anchor="middle">FOUNDERS HUB</text>
</svg>
